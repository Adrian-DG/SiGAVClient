<div class="dashboard-container">
    <!-- Dashboard Header -->
    <div class="dashboard-header">
        <div class="col">
            <h1>Panel de Control - Asistencias</h1>
            <p>Vista general del sistema de asistencias</p>
        </div>
        <div class="col">
            <button mat-raised-button color="primary" (click)="loadReportData()">
                <mat-icon>refresh</mat-icon>
                Actualizar
            </button>
        </div>
    </div>

    <!-- Summary Stats Section -->
    <div class="stats-summary">
        <div class="summary-card">
            <div class="summary-icon">
                <mat-icon>assessment</mat-icon>
            </div>
            <div class="summary-content">
                <h2>{{ totalAsistencias$ | async | number }}</h2>
                <p>Total de Asistencias</p>
                <span class="summary-trend positive">↗ En tiempo real</span>
            </div>
        </div>

        <!-- Charts Dashboard Section -->
        <div class="dashboard-charts">
            <div class="chart-row">


                <!-- Tipo Categoria Chart -->
                <div class="dashboard-chart-container">
                    <div class="chart-header">
                        <div class="chart-title">
                            <mat-icon>category</mat-icon>
                            <h3>Distribución por Categoría</h3>
                        </div>
                        <div class="chart-actions">
                            <button mat-icon-button>
                                <mat-icon>more_vert</mat-icon>
                            </button>
                        </div>
                    </div>
                    <div class="chart-content">
                        <app-dinamyc-chart [chartOptions]="tipoCategoriaChartOptions$" [chartType]="'pie'"
                            [chartData]="tipoCategoriaChartData$">
                        </app-dinamyc-chart>
                    </div>
                </div>

                <!-- Tipo Asistencia Chart -->
                <div class="dashboard-chart-container">
                    <div class="chart-header">
                        <div class="chart-title">
                            <mat-icon>medical_services</mat-icon>
                            <h3>Distribución por Tipo de Asistencia</h3>
                        </div>
                        <div class="chart-actions">
                            <button mat-icon-button>
                                <mat-icon>more_vert</mat-icon>
                            </button>
                        </div>
                    </div>
                    <div class="chart-content">
                        <app-dinamyc-chart [chartOptions]="tipoAsistenciaHorizontalChartOptions$" [chartType]="'bar'"
                            [chartData]="tipoAsistenciaChartData$" [showLegend]="false">
                        </app-dinamyc-chart>
                    </div>
                </div>


            </div>

        </div>

    </div>
