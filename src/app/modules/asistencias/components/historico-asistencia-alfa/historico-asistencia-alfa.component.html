<div mat-dialog-title>
	<h3>Historico de unidad Pre-Hospitalaria</h3>
	<p>{{ data.unidadAlfa | uppercase }}</p>
</div>
<div mat-dialog-content>
	<div class="mat-elevation-z8">
		<table mat-table [dataSource]="datasource">
			<ng-container matColumnDef="identificacion">
				<th mat-header-cell *matHeaderCellDef>Identificación</th>
				<td mat-cell *matCellDef="let row">{{ row.identificacion }}</td>
			</ng-container>
			<ng-container matColumnDef="ciudadano">
				<th mat-header-cell *matHeaderCellDef>Ciudadano</th>
				<td mat-cell *matCellDef="let row">
					{{ row.nombres }} {{ row.apellidos }}
				</td>
			</ng-container>
			<ng-container matColumnDef="medico">
				<th mat-header-cell *matHeaderCellDef>Médico</th>
				<td mat-cell *matCellDef="let row">
					{{ row.medico }}
				</td>
			</ng-container>
			<ng-container matColumnDef="telefono">
				<th mat-header-cell *matHeaderCellDef>Teléfono</th>
				<td mat-cell *matCellDef="let row">{{ row.telefono }}</td>
			</ng-container>
			<ng-container matColumnDef="fecha">
				<th mat-header-cell *matHeaderCellDef>Fecha</th>
				<td mat-cell *matCellDef="let row">
					{{ row.fechaCreacion | date : 'dd/MM/YYYY' }}
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
			<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

			<!-- Row shown when there is no matching data. -->
			<tr class="mat-row" *matNoDataRow>
				<td class="mat-cell" colspan="12" style="width: 100%">
					No hay registros para mostrar
				</td>
			</tr>
		</table>
	</div>
</div>
