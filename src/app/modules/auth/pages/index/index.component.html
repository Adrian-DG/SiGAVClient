<div class="auth-container">
	<div class="carousel-container" (mouseenter)="onCarouselMouseEnter()" (mouseleave)="onCarouselMouseLeave()">
		<div class="carousel-wrapper">
			<div class="slide" *ngFor="let slide of slides; let i = index; trackBy: trackBySlide"
				[class.active]="currentSlide === i">
				<div class="slide-image" [style.background-image]="'url(' + slide.url + ')'">
					<div class="slide-overlay"></div>
					<div class="slide-content">
						<h2 class="slide-title">{{ slide.title }}</h2>
						<p class="slide-description">{{ slide.description }}</p>
					</div>
				</div>
			</div>
		</div>

		<div class="carousel-controls">
			<button type="button" class="carousel-btn prev-btn" (click)="previousSlide()"
				[attr.aria-label]="'Previous slide'">
				<mat-icon>chevron_left</mat-icon>
			</button>
			<button type="button" class="carousel-btn next-btn" (click)="nextSlide()" [attr.aria-label]="'Next slide'">
				<mat-icon>chevron_right</mat-icon>
			</button>
		</div>

		<div class="carousel-play-control">
			<button type="button" class="play-pause-btn" (click)="togglePlayPause()"
				[attr.aria-label]="isPlaying ? 'Pause carousel' : 'Play carousel'">
				<mat-icon>{{ isPlaying ? 'pause' : 'play_arrow' }}</mat-icon>
			</button>
		</div>

		<div class="carousel-indicators">
			<button type="button" *ngFor="let slide of slides; let i = index; trackBy: trackBySlide" class="indicator"
				[class.active]="currentSlide === i" (click)="setCurrentSlide(i)"
				[attr.aria-label]="'Go to slide ' + (i + 1)">
			</button>
		</div>
	</div>

	<div class="auth-content">
		<div class="brand-section">
			<div class="brand-logo">
				<mat-icon class="brand-icon">directions_car</mat-icon>
			</div>
			<h1 class="brand-title">SiGAV</h1>
			<p class="brand-subtitle">Sistema de Gestión de Asistencia Vial</p>
		</div>

		<div class="login-panel">
			<app-login-form></app-login-form>
		</div>
	</div>
</div>
