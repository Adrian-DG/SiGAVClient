<!-- filter -->

<mat-form-field class="filter">
	<mat-label>Filtrar</mat-label>
	<input
		matInput
		(keyup)="loadData()"
		placeholder="denominacion"
		[(ngModel)]="filters.searchTerm"
	/>
</mat-form-field>

<!-- Table -->

<div class="table">
	<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
		<!-- Table header -->
		<ng-container matColumnDef="id">
			<th mat-header-cell *matHeaderCellDef>#</th>
			<td mat-cell *matCellDef="let element; let i = index">
				{{ i + 1 }}
			</td>
		</ng-container>

		<ng-container matColumnDef="ficha">
			<th mat-header-cell *matHeaderCellDef>Ficha</th>
			<td mat-cell *matCellDef="let element">{{ element.ficha }}</td>
		</ng-container>

		<ng-container matColumnDef="denominacion">
			<th mat-header-cell *matHeaderCellDef>denominacion</th>
			<td mat-cell *matCellDef="let element">
				<span *ngIf="element.estaDisponible; else noDisponible">
					{{ element.denominacion }}
				</span>
				<ng-template #noDisponible>
					<span style="color: rgb(199, 31, 31)">
						<strong>Sin denominación</strong>
					</span>
				</ng-template>
			</td>
		</ng-container>

		<ng-container matColumnDef="tipoUnidad">
			<th mat-header-cell *matHeaderCellDef>Tipo Unidad</th>
			<td mat-cell *matCellDef="let element">
				<span *ngIf="element.estaDisponible; else noDisponible">
					{{ element.tipoUnidad }}
				</span>
				<ng-template #noDisponible>
					<span style="color: rgb(199, 31, 31)">
						<strong>No Disponible</strong>
					</span>
				</ng-template>
			</td>
		</ng-container>

		<ng-container matColumnDef="tramo">
			<th mat-header-cell *matHeaderCellDef>Tramo</th>
			<td mat-cell *matCellDef="let element">
				<span *ngIf="element.estaDisponible; else noDisponible">
					{{ element.tramo }}
				</span>
				<ng-template #noDisponible>
					<span style="color: rgb(199, 31, 31)">
						<strong>No Disponible</strong>
					</span>
				</ng-template>
			</td>
		</ng-container>

		<ng-container matColumnDef="disponibilidad">
			<th mat-header-cell *matHeaderCellDef>Disponibilidad</th>
			<td mat-cell *matCellDef="let element">
				<div
					style="margin: auto 70% auto auto"
					class="estatusIndicator"
					[ngClass]="
						element.estaDisponible ? 'disponible' : 'noDisponible'
					"
				></div>
			</td>
		</ng-container>

		<!-- 

		<!-- TODO: Modulo: Unidades (implementar acciones)-->
		<ng-container matColumnDef="acciones">
			<th mat-header-cell *matHeaderCellDef>Acciones</th>
			<td
				mat-cell
				*matCellDef="let element; let i = index"
				class="td-row"
			>
				<button
					mat-icon-button
					(click)="showReassignUnidadDialog(element)"
				>
					<mat-icon style="color: rgb(48, 151, 48)">edit</mat-icon>
				</button>

				<mat-checkbox
					[title]="'Esta Activa ?'"
					[checked]="element.estatus"
					color="accent"
					(change)="desactivarUnidad(element.id)"
				></mat-checkbox>
			</td>
		</ng-container>

		<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
		<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

		<!-- Row shown when there is no matching data. -->
		<tr class="mat-row" *matNoDataRow>
			<td class="mat-cell" colspan="4">No data matching the filter</td>
		</tr>
	</table>
</div>
<mat-divider></mat-divider>
<mat-paginator
	#paginator
	[length]="totalRows"
	[pageIndex]="filters.page"
	[pageSize]="filters.size"
	[pageSizeOptions]="pageSizeOptions"
	(page)="pageChanged($event)"
	aria-label="Select page"
></mat-paginator>
