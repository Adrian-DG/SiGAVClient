<div class="row">
	<mat-form-field appearance="fill" style="width: 45%">
		<mat-label>Denomicación</mat-label>
		<input
			matInput
			type="text"
			[(ngModel)]="newDenominacion.nombre"
			[required]="true"
		/>
	</mat-form-field>

	<mat-form-field appearance="fill" style="width: 45%">
		<mat-label>Tipo Unidad</mat-label>
		<mat-select
			[(ngModel)]="newDenominacion.tipoUnidadId"
			placeholder="Seleccionar Tipo"
			[required]="true"
		>
			<mat-option
				[value]="item.id"
				*ngFor="let item of _cache.tipoUnidades$ | async"
				>{{ item.nombre }}</mat-option
			>
		</mat-select>
	</mat-form-field>

	<mat-form-field appearance="fill" style="width: 100%">
		<mat-label>Tramos</mat-label>
		<input
			type="text"
			matInput
			[formControl]="tramosControl"
			[matAutocomplete]="auto"
		/>
		<mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn">
			<mat-option
				*ngFor="let option of _cache.tramos$ | async"
				[value]="option"
			>
				{{ option.nombre }}
			</mat-option>
		</mat-autocomplete>
	</mat-form-field>

	<button
		mat-raised-button
		color="accent"
		(click)="createDenominacion()"
		[disabled]="isFormValid"
		style="width: 100%"
	>
		Crear Denomicación
	</button>
</div>
