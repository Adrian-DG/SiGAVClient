<!-- filter -->

<mat-form-field class="filter">
	<mat-label>Filtrar</mat-label>
	<input matInput placeholder="denominacion" [formControl]="searchControl" />
</mat-form-field>

<!-- Table -->

<div class="table">
	<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
		<!-- Table header -->
		<ng-container matColumnDef="#">
			<th mat-header-cell *matHeaderCellDef>#</th>
			<td mat-cell *matCellDef="let element; let i = index">
				{{ filters.page * filters.size + i + 1 }}
			</td>
		</ng-container>

		<ng-container matColumnDef="nombre">
			<th mat-header-cell *matHeaderCellDef>Denomicación</th>
			<td mat-cell *matCellDef="let element">
				{{ element.nombre }}
			</td>
		</ng-container>

		<ng-container matColumnDef="tipo">
			<th mat-header-cell *matHeaderCellDef>Tipo</th>
			<td mat-cell *matCellDef="let element">
				{{ element.tipo }}
			</td>
		</ng-container>

		<ng-container matColumnDef="tramo">
			<th mat-header-cell *matHeaderCellDef>Tramo</th>
			<td mat-cell *matCellDef="let element">
				{{ element.tramo }}
			</td>
		</ng-container>

		<!-- <ng-container matColumnDef="region">
			<th mat-header-cell *matHeaderCellDef>Region</th>
			<td mat-cell *matCellDef="let element">
				{{ element.region }}
			</td>
		</ng-container> -->

		<!-- TODO: Modulo: Unidades (implementar acciones)-->
		<ng-container matColumnDef="acciones">
			<th mat-header-cell *matHeaderCellDef>Acciones</th>
			<td mat-cell *matCellDef="let element; let i = index">
				<!-- <button mat-icon-button (click)="openEditDialog(element)">
					<mat-icon class="edit-icon">edit</mat-icon>
				</button> -->
			</td>
		</ng-container>

		<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
		<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

		<!-- Row shown when there is no matching data. -->
		<tr class="mat-row" *matNoDataRow>
			<td class="mat-cell" colspan="5">No data matching the filter</td>
		</tr>
	</table>
</div>
<mat-divider></mat-divider>
<mat-paginator #paginator [length]="totalRows" [pageIndex]="filters.page" [pageSize]="filters.size"
	[pageSizeOptions]="pageSizeOptions" (page)="pageChanged($event)" aria-label="Select page"></mat-paginator>
